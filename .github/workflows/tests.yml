name: CI Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: ./backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        working-directory: ./backend
        run: python -m compileall app

      - name: Run backend tests (if present)
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            PYTHONPATH=$PWD pytest tests/ -v
          else
            echo "No backend tests directory; skipping."
          fi

  frontend-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: /api
        run: npm run build

  docker-compose-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate docker-compose.dev.yml
        run: |
          cp .env.example .env
          docker compose -f docker-compose.dev.yml config

      - name: Validate docker-compose.traefik.yml
        run: docker compose -f docker-compose.traefik.yml config
